name: keqdroid
description: "KEQDIS proxy/VPN client for Android and Windows."
publish_to: 'none'

version: 0.4.3+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.9.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.1
  file_picker: ^12.0.0-beta.5
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^13.1.0
  cupertino_icons: ^1.0.9
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^22.0.0
  dynamic_color: ^1.8.1
  country_flags: ^4.1.2
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3
  intl: ^0.20.2
  open_filex: ^4.5.0
  package_info_plus: ^10.1.0
  flutter_markdown_plus: ^1.0.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  mocktail: ^1.0.4
  image: ^4.8.0

# After `flutter pub get`, run `powershell -File tool/sync_windows_plugins.ps1`
# before Windows builds — Firebase is Android-only and must be stripped from
# the generated Windows plugin list.

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffb2bd"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icon_windows_launcher.png"
    icon_size: 256

flutter_native_splash:
  color: "#FFF5F7"
  color_dark: "#1A1014"
  image: assets/icon.png
  image_dark: assets/icon.png
  android_12:
    color: "#FFF5F7"
    color_dark: "#1A1014"
    image: assets/icon.png
    image_dark: assets/icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_foreground.png
    - assets/icon_windows_launcher.png
    - assets/bin/windows/
